# sprite-me: tell ComfyUI to also look in /runpod-volume/models/ for model files.
#
# Baked into the Docker image at /comfyui/extra_model_paths.yaml (ComfyUI
# reads this file automatically on startup). The top-level key is an
# arbitrary namespace — ComfyUI merges all configured paths with its default
# /comfyui/models/ tree.
#
# Valid keys taken from /comfyui/extra_model_paths.yaml.example in the
# upstream runpod/worker-comfyui image. Do NOT add keys like `unet` or
# `clip` at the top level — those were legacy directory names that are
# now subsumed under `diffusion_models` and `text_encoders` respectively
# via multiline string paths. Invalid keys may cause ComfyUI to fail
# to start (no port 8188 bind).
#
# Expected volume layout:
#   /runpod-volume/models/
#     checkpoints/flux1-dev-fp8.safetensors
#     diffusion_models/flux1-dev-kontext_fp8_scaled.safetensors
#     loras/flux-2d-game-assets.safetensors
#     text_encoders/clip_l.safetensors
#     text_encoders/t5xxl_fp8_e4m3fn.safetensors
#     vae/ae.safetensors

sprite_me:
  base_path: /runpod-volume/models/
  checkpoints: checkpoints/
  clip_vision: clip_vision/
  configs: configs/
  controlnet: controlnet/
  diffusion_models: |
    diffusion_models/
    unet/
  embeddings: embeddings/
  loras: loras/
  text_encoders: |
    text_encoders/
    clip/
  upscale_models: upscale_models/
  vae: vae/
