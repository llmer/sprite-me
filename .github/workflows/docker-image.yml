name: Build & push sprite-me ComfyUI image

# Triggered by:
#   - git tag push matching docker-v* (e.g. `git tag docker-v0.1.0 && git push origin docker-v0.1.0`)
#   - manual workflow_dispatch from the Actions tab
#
# Pushes to Docker Hub as bbbasddaaa/sprite-me-comfyui:<tag> and :latest.
# Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.

on:
  push:
    tags:
      - 'docker-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up runner disk space
        # Base image is ~12 GB; default runner has limited free space.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading "docker-" from git tag: docker-v0.1.0 -> v0.1.0
            echo "tag=${GITHUB_REF_NAME#docker-}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker/comfyui
          file: ./docker/comfyui/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            bbbasddaaa/sprite-me-comfyui:${{ steps.tag.outputs.tag }}
            bbbasddaaa/sprite-me-comfyui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
